    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent-500: #2563eb;
            --accent-600: #1d4ed8;
            --accent-700: #1e40af;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating particles */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.08;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--accent-500), transparent 70%);
            top: -150px; right: -100px;
            animation: float1 8s ease-in-out infinite;
        }
        body::after {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #3b82f6, transparent 70%);
            bottom: -100px; left: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-30px, 20px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -30px); }
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo img {
            height: 50px;
            margin: 0 auto 16px;
            display: block;
        }

        .login-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .login-logo p {
            color: var(--gray-400);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-400);
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group input:focus + i,
        .form-group input:focus ~ i {
            color: var(--accent-500);
        }

        .input-wrapper:focus-within i {
            color: var(--accent-500);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-500) 0%, var(--accent-700) 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 28px;
            position: relative;
            overflow: hidden;
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-login:hover::after {
            transform: translateX(100%);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
            animation: shakeX 0.4s ease-in-out;
        }

        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--gray-400);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover { color: #fff; }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; }
            .login-logo h1 { font-size: 1.25rem; }
        }
    </style>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="../assets/logo.webp" alt="Zinco Roofing">
                <h1>Admin Panel</h1>
                <p>Secure access to lead management</p>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="admin@zincoroof.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Sign In</span>
                    <div class="spinner" id="spinner"></div>
                    <i class="fas fa-arrow-right" id="btnIcon"></i>
                </button>

                <div class="error-message" id="errorMsg"></div>
            </form>

            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://imoaeuefhblivruvrfyd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imltb2FldWVmaGJsaXZydXZyZnlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTQ1NTAsImV4cCI6MjA5MDAzMDU1MH0.tQ1Iv9tbhX6tcZT8W5JMpNRyxpLStxmySGowHm9KKhI';

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if already logged in
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        })();

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('errorMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Show loading state
            loginBtn.disabled = true;
            btnText.textContent = 'Signing in...';
            btnIcon.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const { data, error } = await sb.auth.signInWithPassword({ email, password });

                if (error) throw error;

                // Success — redirect
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message || 'Invalid credentials. Please try again.';
                errorMsg.style.display = 'block';

                // Reset button
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnIcon.style.display = 'inline';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
